<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Mi Área Privada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light mb-4">

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand">Área Privada</span>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="container">
    <div class="card shadow-sm p-4 mb-4">
      <h1 id="welcome-msg">Cargando perfil...</h1>
      <hr>

      <div class="row">
        <div class="col-md-4 text-center">
          <img id="profile-pic" src="https://via.placeholder.com/150" class="rounded-circle mb-3" alt="Foto de perfil"
            style="max-width: 150px; cursor: pointer;">
          <input type="file" id="foto-input" accept="image/*" style="display: none;">
          <p><small class="text-muted">Click en la foto para cambiar</small></p>
        </div>
        <div class="col-md-8">
          <h3>Información Profesional</h3>

          <div class="mb-3">
            <label><strong>Nombre Completo:</strong></label>
            <div class="input-group">
              <input type="text" id="nombre-completo" class="form-control" placeholder="Tu nombre completo">
              <button class="btn btn-outline-secondary" onclick="guardarNombre()">Guardar</button>
            </div>
          </div>

          <p><strong>Email:</strong> <span id="user-email"></span></p>

          <div class="mb-3">
            <label><strong>LinkedIn:</strong></label>
            <div class="input-group">
              <input type="url" id="linkedin-url" class="form-control" placeholder="https://linkedin.com/in/tu-perfil">
              <button class="btn btn-outline-secondary" onclick="guardarLinkedIn()">Guardar</button>
            </div>
          </div>

          <div class="mb-3">
            <label><strong>Cambiar Contraseña:</strong></label>
            <div class="input-group">
              <input type="password" id="password-actual" class="form-control" placeholder="Contraseña actual">
              <input type="password" id="password-nueva" class="form-control" placeholder="Nueva contraseña">
              <button class="btn btn-outline-secondary" onclick="cambiarContraseña()">Actualizar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sección de Eventos y Calendario -->
    <div class="card shadow-sm p-4">
      <h3>Mis Eventos</h3>
      <hr>

      <div class="row">
        <div class="col-md-4">
          <h5>Añadir Evento</h5>
          <div class="mb-3">
            <input type="text" id="evento-titulo" class="form-control" placeholder="Título del evento">
          </div>
          <div class="mb-3">
            <input type="datetime-local" id="evento-fecha" class="form-control">
          </div>
          <div class="mb-3">
            <textarea id="evento-descripcion" class="form-control" rows="3" placeholder="Descripción"></textarea>
          </div>
          <button class="btn btn-primary w-100" onclick="agregarEvento()">Añadir Evento</button>

          <div id="eventos-list" class="mt-4">
            <h6>Próximos Eventos</h6>
            <div id="lista-eventos"></div>
          </div>
        </div>

        <div class="col-md-8">
          <div id="calendario"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="perfil.js"></script>
</body>

</html>
