<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Caja Sorpresa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-5 text-center caja-card">

      <h2 class="mb-2 container">Caja Sorpresa</h2>
      <p class="text-muted">Solo puedes abrirla una vez</p>

      <div class="caja my-4" id="caja">
        🎁
      </div>

      <button class="btn btn-primary btn-lg" id="btnAbrir" onclick="abrirCaja()">
        Abrir Caja
      </button>

      <div id="resultado" class="mt-4"></div>
      <div id="contador" class="mt-3 fw-bold text-danger"></div>

      <button class="btn btn-outline-secondary mt-3 d-none" id="resetBtn" onclick="resetCaja()">
        Reiniciar
      </button>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
